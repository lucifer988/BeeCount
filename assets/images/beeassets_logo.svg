<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- 设计稿 primitives.jsx BeeLogo 的 1:1 迁移：honey body + dark stripes + antennae + wing -->
  <!-- antennae -->
  <path d="M14 6 L12 2 M26 6 L28 2" stroke="#F7C23B" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <circle cx="12" cy="2" r="1.3" fill="#F7C23B"/>
  <circle cx="28" cy="2" r="1.3" fill="#F7C23B"/>
  <!-- hex body -->
  <polygon points="20,6 33,13 33,27 20,34 7,27 7,13" fill="#F7C23B"/>
  <!-- stripes -->
  <rect x="7" y="15" width="26" height="2.5" fill="#0E0E0C"/>
  <rect x="7" y="21" width="26" height="2.5" fill="#0E0E0C"/>
  <rect x="7" y="27" width="26" height="2.5" fill="#0E0E0C" opacity="0.6"/>
  <!-- wing -->
  <ellipse cx="31" cy="14" rx="5" ry="3" fill="#ffffff" opacity="0.35" transform="rotate(-25 31 14)"/>
</svg>
