name: ✨ Feature Request (English)
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! **Describing the problem is more important than the solution** — it lets us decide whether & how to tackle it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I read the [documentation](https://count.beejz.com/docs/intro) — this feature doesn't exist yet
          required: true
        - label: I searched [existing issues / discussions](https://github.com/TNT-Likely/BeeCount/issues?q=is%3Aissue) — no duplicate
          required: true
        - label: This request covers **one independent feature**, not a bundle of unrelated modules
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use case
      description: Describe your current workflow and what's inconvenient. **Don't just say "please add X"** — describe the problem first.
      placeholder: |
        e.g.
        I pay ¥3500 rent monthly. Currently I have to manually enter it each month and often forget.
        Would love a "recurring transaction" that auto-generates monthly.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd ideally like it to work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives (optional)
      description: Other approaches you considered and why they're not sufficient

  - type: textarea
    id: examples
    attributes:
      label: References (optional)
      description: Similar feature in other apps, screenshots welcome

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - Nice to have
        - Useful
        - Important
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution willingness (multi-select)
      options:
        - label: I'm willing to submit a PR (will align with maintainer first)
        - label: I can help test
        - label: I can provide more detailed requirements

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
