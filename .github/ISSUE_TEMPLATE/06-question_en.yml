name: ❓ Question / Help (English)
description: Questions or need help using the app
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **Questions are better in [Discussions](https://github.com/TNT-Likely/BeeCount/discussions)** — issues are for bugs / features.
        >
        > If you do open an issue, please fill in details below.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I read the [documentation](https://count.beejz.com/docs/intro) — no answer
          required: true
        - label: I searched [Issues](https://github.com/TNT-Likely/BeeCount/issues) and [Discussions](https://github.com/TNT-Likely/BeeCount/discussions) — no similar question
          required: true

  - type: textarea
    id: question
    attributes:
      label: The question
      description: What you're trying to do + what's blocking you
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Ledger management
        - Transactions
        - Statistics
        - Import / Export
        - Cloud sync
        - Auto-billing
        - Other features
        - Usage suggestions
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What you've tried
      description: So we don't suggest something you already tried
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "e.g. v3.0.1"

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
