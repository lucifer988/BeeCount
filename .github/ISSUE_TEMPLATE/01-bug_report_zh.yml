name: 🐛 Bug 报告(中文)
description: 报告 BeeCount iOS / Android App 遇到的 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 bug 报告!请填完下面所有 **必填** 项 —— 没有复现步骤的 issue 基本无法定位。

        **自建 Cloud 服务端 / Web 控制台** 的问题请去 [BeeCount-Cloud](https://github.com/TNT-Likely/BeeCount-Cloud/issues)。

  - type: checkboxes
    id: preflight
    attributes:
      label: 前置检查
      options:
        - label: 我已查阅 [官方文档](https://count.beejz.com/docs/intro),确认不是使用方式问题
          required: true
        - label: 我已搜过 [已有 Issues](https://github.com/TNT-Likely/BeeCount/issues?q=is%3Aissue),没有找到重复
          required: true
        - label: 我已升级到最新版本,问题仍在
          required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 一句话清晰说明你遇到了什么
      placeholder: '例:选择 "交通" 分类时 App 闪退'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 详细到别人照着做能复现的程度。至少 3 步,每步一行
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: "例:分类选择完成,返回记账页面"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 出了什么具体现象。有闪退 / 报错请粘贴崩溃日志或截图
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - iOS
        - Android
        - 两端都有
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App 版本
      description: 设置 → 关于 查看
      placeholder: "例:v3.0.1"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 系统版本
      placeholder: "例:iOS 18.2 / Android 15"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号
      placeholder: "例:iPhone 15 Pro / Pixel 8"

  - type: dropdown
    id: sync_mode
    attributes:
      label: 同步模式
      description: 非云同步相关的 bug 可选"本地"
      options:
        - 本地(未开启云同步)
        - BeeCount Cloud(自建)
        - iCloud
        - WebDAV
        - S3
        - Supabase
    validations:
      required: true

  - type: input
    id: cloud_version
    attributes:
      label: BeeCount Cloud 服务端版本
      description: "**只在同步方式选 BeeCount Cloud 时填**。Web 控制台健康检查页 / docker image tag 查看"
      placeholder: "例:v3.0.1"

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / 崩溃堆栈
      description: |
        设置 → 日志中心 导出日志粘贴;或截图(可直接拖拽进来)。
        **敏感信息(账户余额、token)请自行打码**。
      render: text

  - type: textarea
    id: additional
    attributes:
      label: 其他补充(非必填)
