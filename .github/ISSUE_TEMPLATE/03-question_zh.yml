name: ❓ 问题求助(中文)
description: 使用过程中的疑问或需要帮助
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **求助类问题更推荐用 [Discussions](https://github.com/TNT-Likely/BeeCount/discussions)** —— issue 跟踪 bug / feature,Discussions 更适合交流。
        >
        > 确实要开 issue 也可以,请按下面填清楚。

  - type: checkboxes
    id: preflight
    attributes:
      label: 前置检查
      options:
        - label: 我已查阅 [官方文档](https://count.beejz.com/docs/intro),没有找到答案
          required: true
        - label: 我已搜过 [Issues](https://github.com/TNT-Likely/BeeCount/issues) 和 [Discussions](https://github.com/TNT-Likely/BeeCount/discussions),没有找到相同问题
          required: true

  - type: textarea
    id: question
    attributes:
      label: 具体问题
      description: 详细描述你想实现什么 + 遇到了什么困难
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 问题分类
      options:
        - 账本管理
        - 账单记录
        - 数据统计
        - 数据导入导出
        - 云同步
        - 自动记账
        - 其他功能
        - 使用建议
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 已经尝试过什么
      description: 避免推荐你重复尝试的路径
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App 版本
      placeholder: "例:v3.0.1"

  - type: textarea
    id: additional
    attributes:
      label: 其他补充(非必填)
