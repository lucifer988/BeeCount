name: 🐛 Bug Report (English)
description: Report a bug in the BeeCount iOS / Android app
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill every **required** field — issues without reproduction steps can't be triaged.

        **Self-hosted Cloud backend / Web console** issues belong in [BeeCount-Cloud](https://github.com/TNT-Likely/BeeCount-Cloud/issues).

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I read the [documentation](https://count.beejz.com/docs/intro) — this isn't a usage question
          required: true
        - label: I searched [existing issues](https://github.com/TNT-Likely/BeeCount/issues?q=is%3Aissue) — no duplicate
          required: true
        - label: I'm on the latest app version — problem persists
          required: true

  - type: textarea
    id: description
    attributes:
      label: Summary
      description: One-sentence description of what went wrong
      placeholder: "e.g. App crashes when tapping the Transport category"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Detailed enough that someone else can reproduce. At least 3 steps, one per line.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "e.g. Category is selected and screen returns to transaction entry"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead. Paste crash logs or screenshots.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Settings → About
      placeholder: "e.g. v3.0.1"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. iOS 18.2 / Android 15"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "e.g. iPhone 15 Pro / Pixel 8"

  - type: dropdown
    id: sync_mode
    attributes:
      label: Sync mode
      description: Pick "Local" if the bug isn't sync-related
      options:
        - Local (sync disabled)
        - BeeCount Cloud (self-hosted)
        - iCloud
        - WebDAV
        - S3
        - Supabase
    validations:
      required: true

  - type: input
    id: cloud_version
    attributes:
      label: BeeCount Cloud backend version
      description: "**Only if sync mode is BeeCount Cloud**. Web console health check page / docker image tag"
      placeholder: "e.g. v3.0.1"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Crash stack
      description: |
        Settings → Log Center → Export; or paste screenshots (drag & drop).
        **Redact sensitive info** (account balances, tokens) yourself.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
