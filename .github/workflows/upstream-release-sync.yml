name: Upstream Release Sync

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: upstream-release-sync
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPSTREAM_REPO: TNT-Likely/BeeCount
      DEFAULT_BRANCH: main
      RELEASE_WORKFLOW: release.yml
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Discover latest upstream release
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY_SCRIPT'
          import json
          import os
          import urllib.request

          repo = os.environ['UPSTREAM_REPO']
          headers = {
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'github-actions',
          }

          def get_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.load(response)

          release = get_json(f'https://api.github.com/repos/{repo}/releases/latest')
          tag = release['tag_name']
          name = release.get('name') or tag

          ref = get_json(f'https://api.github.com/repos/{repo}/git/ref/tags/{tag}')
          target = ref['object']
          if target['type'] == 'tag':
              target = get_json(target['url'])['object']
          if target['type'] != 'commit':
              raise SystemExit(f'Expected tag {tag} to resolve to a commit, got {target["type"]}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag_name={tag}\n')
              fh.write(f'release_name={name}\n')
              fh.write(f'tag_commit_sha={target["sha"]}\n')

          print(f'Latest upstream release: {tag} ({name}) -> {target["sha"]}')
          PY_SCRIPT

      - name: Sync fork branch to upstream
        id: branch_sync
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"

          git fetch origin --prune --tags
          git fetch upstream --prune --tags
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          TARGET_SHA='${{ steps.upstream.outputs.tag_commit_sha }}'
          CURRENT_SHA="$(git rev-parse HEAD)"

          echo "upstream_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Fork ${DEFAULT_BRANCH}: ${CURRENT_SHA}"
          echo "Upstream release SHA: ${TARGET_SHA}"

          if git merge-base --is-ancestor "${TARGET_SHA}" HEAD; then
            echo 'branch_changed=false' >> "$GITHUB_OUTPUT"
            echo 'Fork branch already contains the latest upstream release commit.'
          else
            if ! git merge --no-commit --no-ff "${TARGET_SHA}"; then
              echo 'Merge reported conflicts; preserving fork workflow files and then checking for remaining conflicts...'
              git restore --source="${CURRENT_SHA}" --staged --worktree .github/workflows || true
              if git diff --name-only --diff-filter=U | grep -q .; then
                echo 'Unresolved conflicts remain outside .github/workflows:'
                git diff --name-only --diff-filter=U
                exit 1
              fi
            else
              git restore --source="${CURRENT_SHA}" --staged --worktree .github/workflows || true
            fi

            git commit --allow-empty --no-edit
            git push origin "${DEFAULT_BRANCH}"
            echo 'branch_changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect existing fork tag
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY_SCRIPT'
          import json
          import os
          import urllib.error
          import urllib.request

          tag = '${{ steps.upstream.outputs.tag_name }}'
          repo = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'github-actions',
          }

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/git/ref/tags/{tag}',
              headers=headers,
          )
          exists = False
          sha = ''

          try:
              with urllib.request.urlopen(req, timeout=30) as response:
                  ref = json.load(response)
              target = ref['object']
              if target['type'] == 'tag':
                  tag_req = urllib.request.Request(target['url'], headers=headers)
                  with urllib.request.urlopen(tag_req, timeout=30) as response:
                      target = json.load(response)['object']
              if target['type'] != 'commit':
                  raise SystemExit(f'Expected fork tag {tag} to resolve to a commit, got {target["type"]}')
              exists = True
              sha = target['sha']
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  body = exc.read().decode(errors='replace')
                  raise SystemExit(f'Failed to inspect fork tag {tag}: {exc.code} {body}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag_exists={str(exists).lower()}\n')
              fh.write(f'tag_sha={sha}\n')

          if exists:
              print(f'Fork already has remote tag {tag} at {sha}')
          else:
              print(f'Fork does not have remote tag {tag}')
          PY_SCRIPT

      - name: Decide whether release rebuild is needed
        id: decision
        shell: bash
        run: |
          set -euo pipefail
          NEEDS_BUILD=false

          if [[ '${{ steps.current.outputs.tag_exists }}' != 'true' ]]; then
            NEEDS_BUILD=true
          elif [[ '${{ steps.upstream.outputs.tag_commit_sha }}' != '${{ steps.current.outputs.tag_sha }}' ]]; then
            NEEDS_BUILD=true
          fi

          echo "needs_build=${NEEDS_BUILD}" >> "$GITHUB_OUTPUT"
          echo "needs_build=${NEEDS_BUILD}"

      - name: Stop when fork already matches latest release
        if: steps.decision.outputs.needs_build != 'true'
        run: echo 'Fork already matches the latest upstream release; nothing to do.'

      - name: Delete old fork version releases and tags
        if: steps.decision.outputs.needs_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LATEST_TAG: ${{ steps.upstream.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY_SCRIPT'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          latest_tag = os.environ['LATEST_TAG']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'github-actions',
          }
          semverish = re.compile(r'^v?\d+(?:\.\d+){1,3}(?:[-+][0-9A-Za-z.-]+)?$')

          def should_delete_tag(name):
              return name == latest_tag or bool(semverish.match(name))

          def request(method, url):
              req = urllib.request.Request(url, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return response.status, response.read().decode() or ''
              except urllib.error.HTTPError as exc:
                  return exc.code, exc.read().decode(errors='replace')

          def paged(url):
              delimiter = '&' if '?' in url else '?'
              page = 1
              while True:
                  status, body = request('GET', f'{url}{delimiter}per_page=100&page={page}')
                  if status != 200:
                      raise SystemExit(f'Failed to list {url}: {status} {body}')
                  items = json.loads(body)
                  if not items:
                      break
                  yield from items
                  if len(items) < 100:
                      break
                  page += 1

          releases_url = f'https://api.github.com/repos/{repo}/releases'
          for rel in paged(releases_url):
              name = rel['tag_name']
              if not should_delete_tag(name):
                  print(f'Skipped non-version release: {name}')
                  continue
              status, body = request('DELETE', f"https://api.github.com/repos/{repo}/releases/{rel['id']}")
              if status not in (204, 404):
                  raise SystemExit(f'Failed to delete release {name}: {status} {body}')
              print(f'Deleted release: {name}')

          tags_url = f'https://api.github.com/repos/{repo}/tags'
          for tag in paged(tags_url):
              name = tag['name']
              if not should_delete_tag(name):
                  print(f'Skipped non-version tag: {name}')
                  continue
              encoded_name = urllib.parse.quote(name, safe='')
              status, body = request('DELETE', f'https://api.github.com/repos/{repo}/git/refs/tags/{encoded_name}')
              if status not in (204, 404):
                  raise SystemExit(f'Failed to delete tag {name}: {status} {body}')
              print(f'Deleted tag: {name}')
          PY_SCRIPT

      - name: Create fork tag at upstream release commit
        if: steps.decision.outputs.needs_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME='${{ steps.upstream.outputs.tag_name }}'
          TARGET_SHA='${{ steps.upstream.outputs.tag_commit_sha }}'

          git fetch upstream --prune --tags
          git tag -f "${TAG_NAME}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG_NAME}" --force
          echo "Created fork tag ${TAG_NAME} at ${TARGET_SHA}"

      - name: Dispatch release build workflow
        if: steps.decision.outputs.needs_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          TAG_NAME: ${{ steps.upstream.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.upstream.outputs.release_name }}
          WORKFLOW_FILE: ${{ env.RELEASE_WORKFLOW }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY_SCRIPT'
          import json
          import os
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          workflow = os.environ['WORKFLOW_FILE']
          tag_name = os.environ['TAG_NAME']

          payload = {
              'ref': os.environ['DEFAULT_BRANCH'],
              'inputs': {
                  'source_ref': tag_name,
                  'tag_name': tag_name,
                  'release_name': os.environ['RELEASE_NAME'],
                  'prerelease': 'false',
                  'create_release': 'true',
              },
          }

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/workflows/{workflow}/dispatches',
              data=json.dumps(payload).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'github-actions',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=60) as response:
              print(f'Dispatch status: {response.status}')
          PY_SCRIPT
