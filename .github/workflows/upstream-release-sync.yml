name: Upstream Release Sync

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: upstream-release-sync
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPSTREAM_REPO: TNT-Likely/BeeCount
      DEFAULT_BRANCH: main
      RELEASE_WORKFLOW: release.yml
    steps:
      - name: Checkout fork
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Discover latest upstream release
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, urllib.request
          repo = os.environ['UPSTREAM_REPO']
          url = f'https://api.github.com/repos/{repo}/releases/latest'
          req = urllib.request.Request(url, headers={
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'github-actions'
          })
          with urllib.request.urlopen(req, timeout=30) as r:
              release = json.load(r)
          tag = release['tag_name']
          name = release.get('name') or tag
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag_name={tag}\n')
              fh.write(f'release_name={name}\n')
          print(f'Latest upstream release: {tag} ({name})')
          PY

      - name: Sync fork branch to upstream
        id: branch_sync
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch origin --prune --tags
          git fetch upstream --prune --tags
          git checkout "${DEFAULT_BRANCH}"
          UPSTREAM_SHA="$(git rev-parse "upstream/${DEFAULT_BRANCH}")"
          CURRENT_SHA="$(git rev-parse HEAD)"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Fork main:     ${CURRENT_SHA}"
          echo "Upstream main: ${UPSTREAM_SHA}"
          if git merge-base --is-ancestor "${UPSTREAM_SHA}" HEAD; then
            echo 'branch_changed=false' >> "$GITHUB_OUTPUT"
            echo 'Fork already contains the latest upstream changes.'
          else
            git merge --no-commit --no-ff "upstream/${DEFAULT_BRANCH}"
            git restore --source="${CURRENT_SHA}" --staged --worktree .github/workflows
            git commit --no-edit
            git push origin "${DEFAULT_BRANCH}"
            echo 'branch_changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect existing fork tag
        id: current
        shell: bash
        run: |
          set -euo pipefail
          TARGET_TAG='${{ steps.upstream.outputs.tag_name }}'
          if git rev-parse -q --verify "refs/tags/${TARGET_TAG}" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "refs/tags/${TARGET_TAG}")"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
            echo "Fork already has tag ${TARGET_TAG} at ${TAG_SHA}"
          else
            echo 'tag_exists=false' >> "$GITHUB_OUTPUT"
            echo 'tag_sha=' >> "$GITHUB_OUTPUT"
            echo "Fork does not have tag ${TARGET_TAG}"
          fi

      - name: Decide whether release rebuild is needed
        id: decision
        shell: bash
        run: |
          set -euo pipefail
          NEEDS_BUILD=false
          if [[ '${{ steps.branch_sync.outputs.upstream_sha }}' != '${{ steps.current.outputs.tag_sha }}' ]]; then
            NEEDS_BUILD=true
          fi
          if [[ '${{ steps.current.outputs.tag_exists }}' != 'true' ]]; then
            NEEDS_BUILD=true
          fi
          echo "needs_build=${NEEDS_BUILD}" >> "$GITHUB_OUTPUT"
          echo "needs_build=${NEEDS_BUILD}"

      - name: Stop when fork already matches latest release
        if: steps.decision.outputs.needs_build != 'true'
        run: echo 'Fork already matches the latest upstream release; nothing to do.'

      - name: Delete old fork releases and tags
        if: steps.decision.outputs.needs_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP_TAG: ${{ steps.upstream.outputs.tag_name }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, urllib.request, urllib.error
          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          keep_tag = os.environ['KEEP_TAG']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'github-actions'
          }

          def request(method, url):
              req = urllib.request.Request(url, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      body = r.read().decode() or ''
                      return r.status, body
              except urllib.error.HTTPError as e:
                  body = e.read().decode() if e.fp else ''
                  return e.code, body

          releases_url = f'https://api.github.com/repos/{repo}/releases?per_page=100'
          status, body = request('GET', releases_url)
          if status != 200:
              raise SystemExit(f'Failed to list releases: {status} {body}')
          releases = json.loads(body)
          for rel in releases:
              if rel['tag_name'] == keep_tag:
                  continue
              status, body = request('DELETE', f"https://api.github.com/repos/{repo}/releases/{rel['id']}")
              if status not in (204, 404):
                  raise SystemExit(f"Failed to delete release {rel['tag_name']}: {status} {body}")
              print(f"Deleted release: {rel['tag_name']}")

          tags_url = f'https://api.github.com/repos/{repo}/tags?per_page=100'
          status, body = request('GET', tags_url)
          if status != 200:
              raise SystemExit(f'Failed to list tags: {status} {body}')
          tags = json.loads(body)
          for tag in tags:
              name = tag['name']
              if name == keep_tag:
                  continue
              status, body = request('DELETE', f'https://api.github.com/repos/{repo}/git/refs/tags/{name}')
              if status not in (204, 404):
                  raise SystemExit(f'Failed to delete tag {name}: {status} {body}')
              print(f'Deleted tag: {name}')
          PY

      - name: Recreate latest release tag on synced main
        if: steps.decision.outputs.needs_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARGET_TAG='${{ steps.upstream.outputs.tag_name }}'
          TARGET_SHA='${{ steps.branch_sync.outputs.upstream_sha }}'
          git fetch origin --prune --tags
          git tag -d "${TARGET_TAG}" >/dev/null 2>&1 || true
          git push origin ":refs/tags/${TARGET_TAG}" >/dev/null 2>&1 || true
          git tag "${TARGET_TAG}" "${TARGET_SHA}"
          git push origin "refs/tags/${TARGET_TAG}" --force

      - name: Dispatch release build workflow
        if: steps.decision.outputs.needs_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.upstream.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.upstream.outputs.release_name }}
          WORKFLOW_FILE: ${{ env.RELEASE_WORKFLOW }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, urllib.request
          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          workflow = os.environ['WORKFLOW_FILE']
          payload = {
              'ref': 'main',
              'inputs': {
                  'tag_name': os.environ['TAG_NAME'],
                  'release_name': os.environ['RELEASE_NAME'],
                  'prerelease': 'false',
                  'create_release': 'true'
              }
          }
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/actions/workflows/{workflow}/dispatches',
              data=json.dumps(payload).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'github-actions',
                  'Content-Type': 'application/json'
              },
              method='POST'
          )
          with urllib.request.urlopen(req, timeout=60) as r:
              print(f'Dispatch status: {r.status}')
          PY
